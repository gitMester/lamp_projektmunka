<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Szavazás – A Nagy Döntés</title>
  <link rel="stylesheet" href="style/szavazas.css">
</head>
<body>

  <!-- Wall decorations: banners left -->
  <div class="wall-banners left">
    <div class="wall-banner" style="--bt:18%"></div>
    <div class="wall-banner" style="--bt:52%"></div>
  </div>

  <!-- Wall decorations: banners right -->
  <div class="wall-banners right">
    <div class="wall-banner" style="--bt:28%"></div>
    <div class="wall-banner" style="--bt:60%"></div>
  </div>

  <!-- Torch sconces -->
  <div class="torch-sconce left" style="--tt:22%">
    <div class="torch-glow-orb"></div>
    <div class="torch-flame-el"></div>
    <div class="torch-pole"></div>
  </div>
  <div class="torch-sconce right" style="--tt:22%">
    <div class="torch-glow-orb"></div>
    <div class="torch-flame-el"></div>
    <div class="torch-pole"></div>
  </div>
  <div class="torch-sconce left" style="--tt:58%">
    <div class="torch-glow-orb"></div>
    <div class="torch-flame-el"></div>
    <div class="torch-pole"></div>
  </div>
  <div class="torch-sconce right" style="--tt:58%">
    <div class="torch-glow-orb"></div>
    <div class="torch-flame-el"></div>
    <div class="torch-pole"></div>
  </div>

  <header>
    <div>
      <h1>(Megették) A Termeszek</h1>
      <nav>
        <a href="fooldal.html" class="nav-link">Főoldal</a>
        <a href="ujkerdes.html" class="nav-link">Új kérdés</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="user-info">
      <p>Bejelentkezve:&nbsp;<strong id="felhasznalonevMegjelenites"></strong>
        <a href="index.html" class="logout-link">Kijelentkezés</a>
      </p>
    </div>

    <div class="loading">Kérdés betöltése…</div>

    <div id="kerdesContainer" style="display:none;">
      <div class="voting-card">

        <!-- Corner ornaments -->
        <span class="card-corner tl">❧</span>
        <span class="card-corner tr">❧</span>
        <span class="card-corner bl">❧</span>
        <span class="card-corner br">❧</span>

        <!-- Header band -->
        <div class="scroll-header">
          <span class="scroll-title">A Királyság Szavazata</span>
        </div>

        <!-- Question -->
        <h2 id="kerdesText" class="question-text"></h2>
        <div class="q-divider"></div>

        <!-- Form -->
        <form id="szavazasForm" class="voting-form">
          <div id="valaszokContainer" class="answers-list"></div>
          <button type="submit" class="btn-vote">Szavazok</button>
        </form>

        <div id="uzenet" class="message"></div>

      </div>
    </div>
  </main>

  <footer>
    <h2>Készítette: Kányai Márk, Léber Bence Bendegúz, Sveiczer Dávid</h2>
  </footer>

  <script src="szavazas.js"></script>

  <!-- AI Chatbot -->
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    window.AIChatConfig = { qid: urlParams.get("qid") ? parseInt(urlParams.get("qid")) : null };
  </script>
  <script src="ai-chatbot.js"></script>
</body>
</html>
